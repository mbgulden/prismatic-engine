# =============================================================================
# Alertmanager Configuration — Prismatic Engine (Phase 4.5 / GRO-1584)
# =============================================================================
# Deploy to: /etc/alertmanager/alertmanager.yml
#
# Routing tree:
#   critical → Telegram (via Prismatic webhook → Bot API)
#   warning  → Slack #hermes-feed (via Prismatic webhook → Slack webhook)
#   info     → log file (Prismatic alert log)
#
# All alerts are forwarded to the Prismatic gateway webhook endpoint
# at http://localhost:9000/api/alerts/webhook, which handles the actual
# Telegram/Slack/log dispatch based on severity labels.
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_require_tls: false

# ── Routing Tree ──────────────────────────────────────────────
# The route matches on severity label and groups alerts to avoid
# notification storms.
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'prismatic_webhook'

  # Child routes for different severity handling
  routes:
    # Critical alerts get their own grouping and immediate dispatch
    - match:
        severity: critical
      group_by: ['alertname']
      group_wait: 5s
      group_interval: 10s
      repeat_interval: 30m
      receiver: 'prismatic_webhook'

    # Warning alerts grouped by alertname
    - match:
        severity: warning
      group_by: ['alertname']
      group_wait: 15s
      group_interval: 30s
      repeat_interval: 1h
      receiver: 'prismatic_webhook'

    # Info alerts: longest grouping interval
    - match:
        severity: info
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'prismatic_webhook'

# ── Receivers ────────────────────────────────────────────────

receivers:
  - name: 'prismatic_webhook'
    webhook_configs:
      - url: 'http://localhost:9000/api/alerts/webhook'
        send_resolved: true
        http_config:
          follow_redirects: true

# ── Inhibition Rules ─────────────────────────────────────────
# Prevent lower-severity alerts from firing when a higher-severity
# alert for the same component is already active.

inhibit_rules:
  # CircuitBreakerTrip suppresses CreditBurnRate for same component
  - source_match:
      alertname: 'CircuitBreakerTrip'
    target_match:
      alertname: 'CreditBurnRate'
    equal: ['component']

  # AgentStall suppresses HighLockContention (stall may cause lock buildup)
  - source_match:
      alertname: 'AgentStall'
    target_match:
      alertname: 'HighLockContention'
    equal: ['component']
