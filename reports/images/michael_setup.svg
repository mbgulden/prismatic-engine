<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    
    <!-- Server Gradients -->
    <linearGradient id="server1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="server2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="leadModelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="workerModelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="40" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC" text-anchor="middle">
    Michael's Dual-Server Setup (192GB VRAM Total)
  </text>
  <text x="400" y="65" font-family="'Outfit', 'Inter', sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">
    Recommended Configuration: Specialist Swarm Cluster (Option B)
  </text>

  <!-- Server 1 (Left) -->
  <g transform="translate(50, 110)" filter="url(#shadow)">
    <rect width="320" height="280" rx="12" fill="#1E293B" stroke="#BE185D" stroke-width="2"/>
    <rect width="320" height="40" rx="12" fill="url(#server1Grad)"/>
    <text x="160" y="26" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SERVER 1 (96GB VRAM)</text>
    
    <!-- Lead Architect Block -->
    <g transform="translate(30, 70)">
      <rect width="260" height="150" rx="8" fill="url(#leadModelGrad)"/>
      <text x="130" y="35" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Lead Architect Agent</text>
      <rect x="20" y="55" width="220" height="24" rx="4" fill="#0F172A" opacity="0.4"/>
      <text x="130" y="71" font-family="'Consolas', monospace" font-size="11" fill="#DDD6FE" text-anchor="middle">DeepSeek-R1 (FP8 sharded)</text>
      
      <text x="130" y="105" font-family="'Inter', sans-serif" font-size="10" fill="#E9D5FF" text-anchor="middle">Role: Task Planning, Code Review,</text>
      <text x="130" y="120" font-family="'Inter', sans-serif" font-size="10" fill="#E9D5FF" text-anchor="middle">Math Reasoning, Dynamic Routing</text>
    </g>
  </g>

  <!-- Server 2 (Right) -->
  <g transform="translate(430, 110)" filter="url(#shadow)">
    <rect width="320" height="280" rx="12" fill="#1E293B" stroke="#1D4ED8" stroke-width="2"/>
    <rect width="320" height="40" rx="12" fill="url(#server2Grad)"/>
    <text x="160" y="26" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">SERVER 2 (96GB VRAM)</text>
    
    <!-- Worker Blocks -->
    <g transform="translate(20, 60)">
      <!-- Worker 1 -->
      <g transform="translate(0, 0)">
        <rect width="130" height="85" rx="6" fill="url(#workerModelGrad)"/>
        <text x="65" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Coder Worker 1</text>
        <text x="65" y="45" font-family="'Consolas', monospace" font-size="8" fill="#A7F3D0" text-anchor="middle">Qwen 2.5 Coder 32B</text>
        <text x="65" y="65" font-family="'Inter', sans-serif" font-size="9" fill="#D1FAE5" text-anchor="middle">Running at FP16</text>
      </g>
      
      <!-- Worker 2 -->
      <g transform="translate(150, 0)">
        <rect width="130" height="85" rx="6" fill="url(#workerModelGrad)"/>
        <text x="65" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Coder Worker 2</text>
        <text x="65" y="45" font-family="'Consolas', monospace" font-size="8" fill="#A7F3D0" text-anchor="middle">Qwen 2.5 Coder 32B</text>
        <text x="65" y="65" font-family="'Inter', sans-serif" font-size="9" fill="#D1FAE5" text-anchor="middle">Running at FP16</text>
      </g>
      
      <!-- Worker 3 -->
      <g transform="translate(0, 105)">
        <rect width="130" height="85" rx="6" fill="url(#workerModelGrad)"/>
        <text x="65" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Coder Worker 3</text>
        <text x="65" y="45" font-family="'Consolas', monospace" font-size="8" fill="#A7F3D0" text-anchor="middle">Qwen 2.5 Coder 32B</text>
        <text x="65" y="65" font-family="'Inter', sans-serif" font-size="9" fill="#D1FAE5" text-anchor="middle">Running at FP16</text>
      </g>
      
      <!-- Worker 4 -->
      <g transform="translate(150, 105)">
        <rect width="130" height="85" rx="6" fill="url(#workerModelGrad)"/>
        <text x="65" y="25" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Coder Worker 4</text>
        <text x="65" y="45" font-family="'Consolas', monospace" font-size="8" fill="#A7F3D0" text-anchor="middle">Qwen 2.5 Coder 32B</text>
        <text x="65" y="65" font-family="'Inter', sans-serif" font-size="9" fill="#D1FAE5" text-anchor="middle">Running at FP16</text>
      </g>
    </g>
  </g>

  <!-- Network Interconnect (Center arrow) -->
  <g transform="translate(370, 220)">
    <path d="M 0,0 L 60,0" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M 60,15 L 0,15" stroke="#F59E0B" stroke-width="3" marker-end="url(#arrow)"/>
    <text x="30" y="-10" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" fill="#FBBF24" text-anchor="middle">Network / PCIe</text>
  </g>
  
  <!-- Arrow definitions -->
  <svg>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
      </marker>
    </defs>
  </svg>

</svg>
