# Prismatic Engine — Pre-Commit Configuration
# See https://pre-commit.com/ for more information
# Install: pip install pre-commit && pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # Gap 13: Ship-time plugin load verification.
  # Runs whenever files under plugins/ or prismatic/core/registry.py change.
  # Catches plugins whose manifests declare version constraints
  # incompatible with the running core, broken entry_points, etc.
  # See okf/operations/gap13-plugin-load-gate-spec-2026-06-29.md
  - repo: local
    hooks:
      - id: plugin-load-gate
        name: Verify shipped plugins load
        entry: python -m prismatic.quality.plugin_load
        language: system
        pass_filenames: false
        files: ^(plugins/|prismatic/core/registry\.py|prismatic/quality/plugin_load\.py)
