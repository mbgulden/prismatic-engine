# PRISMATIC ENGINE — Workspace Governance
# Phase 1: Convention Layer
# Installed: 2026-06-11 by Ned (agent:ned)
#
# This file governs how AI agents collaborate on this repository.
# Every agent MUST respect lane assignments, branch conventions, and locking protocol.

version: 1

agents:
  fred:
    role: Orchestrator & Infrastructure
    lanes:
      owner: ["src/", "infra/", "deploy/", ".github/"]
      read_only: ["content/", "active-oahu/"]
    branch_prefix: "feature/"
    staging_governor: true  # Only Fred merges to staging

  kai:
    role: Content Writer
    lanes:
      owner: ["content/", "active-oahu/"]
      read_only: ["src/", "infra/", "deploy/"]
    branch_prefix: "content/"

  agy:
    role: Designer & Researcher
    lanes:
      owner: ["assets/", "designs/", "research/"]
      read_only: ["src/", "content/", "active-oahu/"]
    branch_prefix: "design/"

  jules:
    role: PR Agent & Code Reviewer
    lanes:
      owner: []  # No direct edits — PR-only
      read_only: ["*"]  # Everything
    branch_prefix: "fix/"

  ned:
    role: Code Execution & Task Agent
    lanes:
      owner: ["scripts/", "prismatic/", "plugins/"]
      read_only: ["content/", "assets/", "designs/", "research/"]
    branch_prefix: "ned/"

locks:
  file: "/home/ubuntu/.antigravity/swarm_locks.json"
  heartbeat_interval_s: 60
  heartbeat_ttl_ms: 300000  # 5-minute stale timeout

staging:
  governor: "fred"  # Only this agent merges to deploy-fresh/staging
  branch: "deploy-fresh"

commit:
  prefix_format: "[AGENT] description (#ISSUE)"
  example: "[Kai] Add mokulua islands tour page (#GRO-1215)"
