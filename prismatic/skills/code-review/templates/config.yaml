# =============================================================================
# Code Review Skill — Configuration Template
# =============================================================================
# Copy this file to your project root or the skill's config directory and
# adjust values to match your team's review standards.
#
#   cp templates/config.yaml skills/code-review/config.yaml
#
# Reference: ./README.md

# ---------------------------------------------------------------------------
# Enable / disable rule categories and individual checks.
# ---------------------------------------------------------------------------
rules:
  # Predefined categories — comment out to skip entirely.
  - security
  - performance
  - style

  # Uncomment to enable only individual checks (disables category-level
  # scanning above; comment out the categories when using granular mode).
  # - sql-injection
  # - xss
  # - csrf
  # - hardcoded-secrets
  # - auth-bypass
  # - n-plus-one
  # - missing-indexes
  # - memory-leaks
  # - unnecessary-allocations
  # - naming
  # - formatting
  # - dead-code
  # - complexity
  # - duplication

# ---------------------------------------------------------------------------
# Severity overrides — raise or lower individual check severity.
# ---------------------------------------------------------------------------
severity_overrides:
  # sql-injection: error        # Already error by default
  # indentation: warning        # Downgrade from error to warning
  # naming-convention: info     # Downgrade to info/nit

# ---------------------------------------------------------------------------
# Comment limits — avoid overwhelming authors.
# ---------------------------------------------------------------------------
max_comments: 10
max_comments_per_file: 5
max_comments_per_category: 8

# ---------------------------------------------------------------------------
# File filters — include / exclude paths from review.
# ---------------------------------------------------------------------------
include_paths:
  - "**/*.py"
  - "**/*.js"
  - "**/*.ts"
  - "**/*.go"
  - "**/*.java"
  - "**/*.rb"
  - "**/*.rs"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.json"

exclude_paths:
  - "**/*.pb.go"
  - "**/*_gen.go"
  - "**/*_generated.go"
  - "**/*.min.js"
  - "**/*.min.css"
  - "**/vendor/**"
  - "**/node_modules/**"
  - "**/.git/**"
  - "**/__pycache__/**"
  - "**/*.snap"
  - "**/*_test.go"
  - "**/test/**"
  - "**/tests/**"
  - "**/*.spec.*"
  - "**/*.test.*"

# ---------------------------------------------------------------------------
# Generated file detection — patterns that identify auto-generated files so
# they can be reviewed for correctness but not flagged for style.
# ---------------------------------------------------------------------------
generated_patterns:
  - "// Code generated by"
  - "// @generated"
  - "// AUTO-GENERATED"
  - "# Code generated by"
  - "# @generated"
  - "DO NOT EDIT"

# ---------------------------------------------------------------------------
# Context settings — how much surrounding code to show in comments.
# ---------------------------------------------------------------------------
context:
  lines_before: 3
  lines_after: 3

# ---------------------------------------------------------------------------
# VCS integration.
# ---------------------------------------------------------------------------
vcs:
  provider: auto                    # auto, github, gitlab, bitbucket, gitea
  review_event: REQUEST_CHANGES     # REQUEST_CHANGES | COMMENT | APPROVE
  draft_review: false               # Post as a draft/pending review
  bot_name: Prismatic Engine        # Display name for the bot user

# ---------------------------------------------------------------------------
# Custom rules directory — additional YAML rule files loaded at runtime.
# ---------------------------------------------------------------------------
custom_rules_dir: rules/

# ---------------------------------------------------------------------------
# Advanced.
# ---------------------------------------------------------------------------
output_format: diff                # diff | terminal | json
skip_tests: true
skip_generated: true
cache_results: true                # Avoid re-checking unchanged files
parallel_workers: 4                # Number of parallel analysis workers
timeout_seconds: 120               # Per-file analysis timeout
